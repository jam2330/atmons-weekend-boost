name: Build ATMons Weekend Boost

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.8

    - name: Build mod
      run: ./gradlew build

    - name: Upload mod jar
      uses: actions/upload-artifact@v4
      with:
        name: atmons-weekend-boost
        path: build/libs/atmons-weekend-boost-*.jar
        if-no-files-found: error

    - name: Create Release
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: ATMons Weekend Boost v1.0.${{ github.run_number }}
        files: build/libs/atmons-weekend-boost-*.jar
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
